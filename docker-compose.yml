services:
  startpage-web:
    build:
      context: ./backend
    container_name: startpage-web
    ports:
      - "8080:8080"
    environment:
      STARTPAGE_ENABLE_MOCK_AUTH: "${STARTPAGE_ENABLE_MOCK_AUTH:-true}"
      STARTPAGE_ENABLE_MOCK_INTEGRATIONS: "${STARTPAGE_ENABLE_MOCK_INTEGRATIONS:-true}"
      STARTPAGE_CONNECTOR_ENABLED: "${STARTPAGE_CONNECTOR_ENABLED:-false}"
      STARTPAGE_CONNECTOR_URL: "${STARTPAGE_CONNECTOR_URL:-http://startpage-connector:8090}"
      STARTPAGE_CONNECTOR_TIMEOUT_SECONDS: "${STARTPAGE_CONNECTOR_TIMEOUT_SECONDS:-6}"
      STARTPAGE_ALLOWED_ORIGINS: "${STARTPAGE_ALLOWED_ORIGINS:-*}"
      STARTPAGE_LDAP_SERVER: "${STARTPAGE_LDAP_SERVER:-ldaps://dc.de.toyota-fs.com}"
      STARTPAGE_LDAP_BASE_DN: "${STARTPAGE_LDAP_BASE_DN:-DC=de,DC=toyota-fs,DC=com}"
      STARTPAGE_LDAP_DOMAIN_SUFFIX: "${STARTPAGE_LDAP_DOMAIN_SUFFIX:-de.toyota-fs.com}"
      STARTPAGE_SESSION_TTL_MINUTES: "${STARTPAGE_SESSION_TTL_MINUTES:-480}"
      STARTPAGE_MOCK_GROUPS: "${STARTPAGE_MOCK_GROUPS:-Startpage-Users,Startpage-Dashboard-Editors,Startpage-Platform-Admins,Startpage-Citrix-Admins}"
      STARTPAGE_ROLLOUT_TASKS_DIR: "${STARTPAGE_ROLLOUT_TASKS_DIR:-}"
      STARTPAGE_ROLLOUT_NAME_MAP_DIR: "${STARTPAGE_ROLLOUT_NAME_MAP_DIR:-}"
      STARTPAGE_ROLLOUT_CONTROL_DIR: "${STARTPAGE_ROLLOUT_CONTROL_DIR:-}"
      STARTPAGE_ROLLOUT_STATUS_DIR: "${STARTPAGE_ROLLOUT_STATUS_DIR:-}"
      STARTPAGE_ROLLOUT_MOCK_STEP_DELAY_SECONDS: "${STARTPAGE_ROLLOUT_MOCK_STEP_DELAY_SECONDS:-1}"
      STARTPAGE_AUDIT_LOG_ENABLED: "${STARTPAGE_AUDIT_LOG_ENABLED:-true}"
      STARTPAGE_AUDIT_LOG_DIR: "${STARTPAGE_AUDIT_LOG_DIR:-/app/data/logs}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  startpage-connector:
    build:
      context: ./connector
    container_name: startpage-connector
    profiles:
      - connector
    ports:
      - "8090:8090"
    environment:
      STARTPAGE_CONNECTOR_MOCK: "${STARTPAGE_CONNECTOR_MOCK:-true}"
      STARTPAGE_CITRIX_ADMIN_ADDRESS: "${STARTPAGE_CITRIX_ADMIN_ADDRESS:-ddc01.local}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: Nginx reverse proxy for production
  startpage-nginx:
    image: nginx:alpine
    container_name: startpage-nginx
    profiles:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certs:/etc/nginx/certs:ro
    depends_on:
      startpage-web:
        condition: service_healthy
    restart: unless-stopped
